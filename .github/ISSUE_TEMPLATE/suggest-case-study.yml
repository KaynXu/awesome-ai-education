name: Suggest field evidence
description: Propose a named AI for education implementation for human editorial review.
title: "[Field Evidence] "
labels:
  - submission:case-study
body:
  - type: markdown
    attributes:
      value: |
        Field Evidence shows implementation context. Vendor-published cases are welcome when clearly disclosed.

  - type: input
    id: setting-name
    attributes:
      label: Named education setting
      description: Name the classroom, school, district, university, learning center, or education team.
      placeholder: Example School District
    validations:
      required: true

  - type: input
    id: source-url
    attributes:
      label: Public source URL
      description: Link directly to the implementation record.
      placeholder: https://example.org/case-study
    validations:
      required: true

  - type: textarea
    id: scale
    attributes:
      label: Implementation scale
      description: State the number of classrooms, schools, users, or duration when public.
      placeholder: Describe the public scale and timeline.
    validations:
      required: true

  - type: textarea
    id: participants
    attributes:
      label: Participants
      description: Identify the educators, learners, leaders, or teams involved.
      placeholder: Describe the people involved.
    validations:
      required: true

  - type: textarea
    id: education-workflow
    attributes:
      label: Education workflow
      description: Explain what changed in teaching, learning, assessment, feedback, tutoring, curriculum, operations, governance, or educator development.
      placeholder: Describe the implemented workflow.
    validations:
      required: true

  - type: textarea
    id: ai-role
    attributes:
      label: Role of AI
      description: Explain what AI did in the implementation.
      placeholder: Describe the AI capability and its place in the workflow.
    validations:
      required: true

  - type: textarea
    id: observed-result
    attributes:
      label: Observed result or operational change
      description: Report only what the public source supports.
      placeholder: Describe the reported result and any stated limitations.
    validations:
      required: true

  - type: input
    id: source-owner
    attributes:
      label: Source owner
      description: Name the organization that published the source.
      placeholder: Publisher name
    validations:
      required: true

  - type: dropdown
    id: vendor-published
    attributes:
      label: Is the source vendor-published?
      options:
        - "Yes"
        - "No"
        - "Unclear"
    validations:
      required: true

  - type: textarea
    id: affiliation
    attributes:
      label: Your affiliation
      description: State your role, organization, and relationship to the source or write `No affiliation`.
      placeholder: No affiliation
    validations:
      required: true

  - type: dropdown
    id: self-promotion
    attributes:
      label: Self-promotion or material relationship
      options:
        - "No"
        - "Yes, disclosed in the affiliation field"
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: This is a real education implementation, not a hypothetical use case.
          required: true
        - label: I have separated reported facts from my interpretation.
          required: true
