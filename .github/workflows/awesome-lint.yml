name: Awesome Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint README
        run: npx --yes awesome-lint README.md
